services:
  postgres:
    image: postgres:16-alpine
    container_name: sketchcatch-postgres
    environment:
      POSTGRES_USER: sketch
      POSTGRES_PASSWORD: sketch
      POSTGRES_DB: sketchcatch
    ports:
      - "5432:5432"
    volumes:
      - sketchcatch-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sketch -d sketchcatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sketchcatch-redis
    ports:
      - "6379:6379"
    volumes:
      - sketchcatch-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sketchcatch-postgres:
  sketchcatch-redis:
